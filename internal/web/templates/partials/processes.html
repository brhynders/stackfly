<div class="bg-white rounded-lg border border-gray-200">
    {{if .Processes}}
    <table class="w-full">
        <thead>
            <tr class="border-b border-gray-200">
                <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-5 py-3">Type</th>
                <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-5 py-3">Command</th>
                <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-5 py-3">Replicas</th>
                <th class="text-right text-xs font-medium text-gray-500 uppercase tracking-wider px-5 py-3">Scale</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {{range .Processes}}
            {{if eq .Type "release"}}{{continue}}{{end}}
            <tr>
                <td class="px-5 py-3">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-50 text-indigo-700">
                        {{.Type}}
                    </span>
                </td>
                <td class="px-5 py-3 text-sm text-gray-600 font-mono">{{if .Command}}{{.Command}}{{else}}<span class="text-gray-400 italic">auto-detected</span>{{end}}</td>
                <td class="px-5 py-3 text-sm text-gray-900 font-medium">{{.Replicas}}</td>
                <td class="px-5 py-3 text-right">
                    <form hx-post="/apps/{{$.AppName}}/scale" hx-target="#tab-content" class="inline-flex items-center gap-2">
                        <input type="hidden" name="type" value="{{.Type}}">
                        <input type="number" name="replicas" value="{{.Replicas}}" min="0" max="20"
                            class="w-16 px-2 py-1 border border-gray-300 rounded text-sm text-center focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="submit" class="px-2 py-1 text-xs bg-gray-100 text-gray-700 rounded hover:bg-gray-200">
                            Scale
                        </button>
                    </form>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
    {{else}}
    <div class="text-center py-8 text-gray-400 text-sm">
        No processes defined. Deploy your app with a Procfile to define processes.
    </div>
    {{end}}
</div>
