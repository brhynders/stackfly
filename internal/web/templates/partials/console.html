<div class="space-y-4">
    <div class="bg-white rounded-lg border border-gray-200 p-5">
        <h3 class="text-sm font-medium text-gray-900 mb-3">Run Command</h3>
        <p class="text-xs text-gray-400 mb-3">Runs a one-off command in a new container using the app's current image and environment. Useful for migrations, seeds, and debugging.</p>
        <form hx-post="/apps/{{.AppName}}/console/run" hx-target="#run-result" hx-swap="innerHTML" class="flex items-end gap-3">
            <div class="flex-1">
                <input type="text" name="command" required autofocus
                    placeholder="npm run migrate"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit"
                class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 whitespace-nowrap">
                Run
            </button>
        </form>
    </div>

    <div id="run-result"></div>
</div>
