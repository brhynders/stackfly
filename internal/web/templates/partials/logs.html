<div class="space-y-4">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <h3 class="text-sm font-medium text-gray-900">Runtime Logs</h3>
            <select id="log-process" onchange="reconnectLogs()"
                class="px-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">All processes</option>
                {{range .Processes}}
                <option value="{{.Type}}">{{.Type}}</option>
                {{end}}
            </select>
        </div>
        <button onclick="clearLogs()" class="text-xs text-gray-500 hover:text-gray-700">Clear</button>
    </div>

    <pre id="runtime-log" class="log bg-gray-900 text-gray-100 rounded-md p-4 overflow-x-auto overflow-y-auto text-xs leading-relaxed" style="height: 500px;"></pre>

    <script>
    var logSource = null;

    function connectLogs() {
        if (logSource) logSource.close();
        var proc = document.getElementById('log-process').value;
        var url = '/apps/{{.AppName}}/logs/stream';
        if (proc) url += '?process=' + proc;
        logSource = new EventSource(url);
        var el = document.getElementById('runtime-log');
        logSource.onmessage = function(e) {
            el.textContent += e.data + '\n';
            el.scrollTop = el.scrollHeight;
        };
        logSource.onerror = function() {
            el.textContent += '\n--- stream ended ---\n';
            logSource.close();
        };
    }

    function reconnectLogs() {
        document.getElementById('runtime-log').textContent = '';
        connectLogs();
    }

    function clearLogs() {
        document.getElementById('runtime-log').textContent = '';
    }

    connectLogs();

    // Clean up when navigating away
    document.body.addEventListener('htmx:beforeSwap', function() {
        if (logSource) { logSource.close(); logSource = null; }
    }, {once: true});
    </script>
</div>
