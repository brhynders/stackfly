<div class="space-y-4">
    <div class="bg-white rounded-lg border border-gray-200 p-5">
        <h3 class="text-sm font-medium text-gray-900 mb-3">Add Environment Variable</h3>
        <form hx-post="/apps/{{.AppName}}/env" hx-target="#tab-content" class="flex items-end gap-3">
            <div class="w-48">
                <label class="block text-xs text-gray-500 mb-1">Key</label>
                <input type="text" name="key" required placeholder="DATABASE_URL"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex-1">
                <label class="block text-xs text-gray-500 mb-1">Value</label>
                <input type="text" name="value" required placeholder="postgres://..."
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit"
                class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700">
                Set
            </button>
        </form>
        <p class="text-xs text-gray-400 mt-2">Changes take effect on next deploy or restart.</p>
    </div>

    {{if .EnvVars}}
    <div class="bg-white rounded-lg border border-gray-200 divide-y divide-gray-100">
        {{range .EnvVars}}
        <div class="flex items-center justify-between px-5 py-3">
            <div class="flex items-center gap-3 min-w-0">
                <span class="text-sm font-medium text-gray-900 font-mono">{{.Key}}</span>
                <span class="text-sm text-gray-400 font-mono truncate">{{truncate .Value 50}}</span>
            </div>
            <button hx-delete="/apps/{{$.AppName}}/env/{{.Key}}" hx-target="#tab-content"
                hx-confirm="Remove {{.Key}}?"
                class="text-xs text-red-500 hover:text-red-700 flex-shrink-0 ml-2">
                Remove
            </button>
        </div>
        {{end}}
    </div>
    {{else}}
    <div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400 text-sm">
        No environment variables set.
    </div>
    {{end}}
</div>
