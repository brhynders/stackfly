{{define "content"}}
<div class="max-w-lg">
    <h1 class="text-xl font-semibold text-gray-900 mb-6">Create New App</h1>

    {{if .Flash}}
    <div class="mb-4 p-3 rounded-md bg-red-50 text-red-700 text-sm">{{.Flash}}</div>
    {{end}}

    <form method="POST" action="/apps" class="bg-white rounded-lg border border-gray-200 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">App Name</label>
            <input type="text" name="name" required autofocus
                pattern="[a-z0-9][a-z0-9-]*[a-z0-9]"
                placeholder="my-app"
                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
            <p class="text-xs text-gray-400 mt-1">Lowercase letters, numbers, and hyphens only.</p>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit"
                class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Create App
            </button>
            <a href="/" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>
</div>
{{end}}
